[build]
  command = "node scripts/optimize-images.js && npm run build && cp -r landing/. dist/"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Stripe webhook — must hit the function, not the SPA fallback
[[redirects]]
  from = "/.netlify/functions/stripe-webhook"
  to   = "/.netlify/functions/stripe-webhook"
  status = 200

# SPA fallback — lets React Router handle all /app/* routes
[[redirects]]
  from = "/app/*"
  to   = "/app/index.html"
  status = 200
